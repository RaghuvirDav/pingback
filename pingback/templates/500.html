{% extends "base.html" %}
{% block title %}500 - Server Error | Pingback{% endblock %}
{% block body %}
{% include "nav.html" %}

<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-6">
  <div class="text-center animate-fade-in">
    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-3xl bg-surface-900/60 border border-surface-800/60">
      <span class="text-4xl font-black text-red-500">500</span>
    </div>
    <h1 class="text-2xl font-bold tracking-tight text-white">Something went wrong</h1>
    <p class="mt-3 text-sm text-surface-500 max-w-sm mx-auto leading-relaxed">
      We hit an unexpected error. Our team has been notified. Please try again in a moment.
    </p>
    <div class="mt-8 flex items-center justify-center gap-3">
      <a href="/dashboard" class="rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-500 transition-all shadow-lg shadow-brand-600/20">Go to dashboard</a>
      <a href="/" class="rounded-xl border border-surface-700 px-5 py-2.5 text-sm font-semibold text-surface-300 hover:border-surface-500 hover:text-white transition-all">Back to home</a>
    </div>
  </div>
</div>
{% endblock %}
