{% extends "base.html" %}
{% import "_brand.html" as brand %}
{% block title %}500 — Pingback{% endblock %}
{% block body %}
<main class="main" id="main">
  {% include "nav.html" %}
  <div class="centerpage">
    <div class="auth-card" style="text-align:center">
      <div class="auth-brand">{{ brand.brand_mark(36) }}</div>
      <div class="mono small" style="letter-spacing:0.2em;margin-bottom:8px;color:var(--down)">500</div>
      <h1>Something went wrong</h1>
      <p style="color:var(--fg-2);margin:10px 0 22px">We hit an unexpected error. Our team has been notified.</p>
      <div class="row" style="justify-content:center;gap:8px">
        <a class="btn btn-primary" href="/dashboard">Go to dashboard</a>
        <a class="btn" href="/">Home</a>
      </div>
    </div>
  </div>
</main>
{% endblock %}
