<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pingback{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% if user and (user.timezone or 'Etc/UTC') == 'Etc/UTC' %}
  <script>
    // MAK-126: one-shot browser-tz seed. Only fires while the server still
    // has the legacy Etc/UTC default — never clobbers an explicit pick. Uses
    // sessionStorage to avoid POSTing on every page nav within a tab.
    (function () {
      try {
        if (sessionStorage.getItem("pb_tz_seeded") === "1") return;
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (!tz || tz === "Etc/UTC") { sessionStorage.setItem("pb_tz_seeded", "1"); return; }
        fetch("/api/users/me/timezone", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ timezone: tz }),
        }).finally(function () { sessionStorage.setItem("pb_tz_seeded", "1"); });
      } catch (e) { /* no-op */ }
    })();
  </script>
  {% endif %}
</body>
</html>
