{% extends "base.html" %}
{% block title %}Sign Up - Pingback{% endblock %}
{% block body %}
{% include "nav.html" %}
<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-6">
  <div class="w-full max-w-sm animate-fade-in">
    <div class="text-center mb-10">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-500/10 border border-brand-500/20">
        <svg class="h-6 w-6 text-brand-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Create your account</h1>
      <p class="text-surface-400 text-sm mt-2">Start monitoring in under a minute</p>
    </div>

    {% if error %}
    <div class="mb-6 rounded-xl bg-red-500/10 border border-red-500/15 px-4 py-3 text-sm text-red-400 animate-slide-up">{{ error }}</div>
    {% endif %}

    <form method="post" action="/signup" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-surface-300 mb-2">Email</label>
        <input type="email" id="email" name="email" required value="{{ email or '' }}"
               class="w-full rounded-xl border border-surface-700 bg-surface-900 px-4 py-2.5 text-sm text-white placeholder-surface-500 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 transition-all"
               placeholder="you@example.com">
      </div>
      <div>
        <label for="name" class="block text-sm font-medium text-surface-300 mb-2">Name</label>
        <input type="text" id="name" name="name" value="{{ name or '' }}"
               class="w-full rounded-xl border border-surface-700 bg-surface-900 px-4 py-2.5 text-sm text-white placeholder-surface-500 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 transition-all"
               placeholder="Jane Doe">
      </div>
      <button type="submit"
              class="w-full rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:ring-offset-2 focus:ring-offset-surface-950 transition-all shadow-lg shadow-brand-600/20">
        Create account
      </button>
    </form>

    <p class="mt-8 text-center text-sm text-surface-500">
      Already have an account? <a href="/login" class="text-brand-400 hover:text-brand-300 font-medium transition-colors">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
