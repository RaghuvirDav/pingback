{% extends "base.html" %}
{% block title %}Login - Pingback{% endblock %}
{% block body %}
{% include "nav.html" %}
<div class="flex min-h-[calc(100vh-3.5rem)] items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-white text-center mb-2">Welcome back</h1>
    <p class="text-center text-slate-400 text-sm mb-8">Enter your API key to access your dashboard</p>

    {% if error %}
    <div class="mb-4 rounded-lg bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-400">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label for="api_key" class="block text-sm font-medium text-slate-300 mb-1">API Key</label>
        <input type="password" id="api_key" name="api_key" required
               class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-white placeholder-slate-500 focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500"
               placeholder="pb_...">
      </div>
      <button type="submit"
              class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white hover:bg-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-slate-950">
        Sign in
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      Don't have an account? <a href="/signup" class="text-brand-400 hover:text-brand-300">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
