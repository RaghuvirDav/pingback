{% import "_brand.html" as brand %}
<nav class="landing-nav" aria-label="Primary">
  <a href="/" class="brand" style="padding:0">{{ brand.brand_logo(26) }}</a>
  <div class="spacer"></div>
  <a href="/#features" class="btn btn-ghost">Features</a>
  <a href="/pricing" class="btn btn-ghost">Pricing</a>
  {% if user %}
    <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
    <form method="post" action="/logout" style="display:inline">
      <button type="submit" class="btn">Log out</button>
    </form>
  {% else %}
    <a href="/login" class="btn btn-ghost">Sign in</a>
    <a href="/signup" class="btn btn-primary">Start free</a>
  {% endif %}
</nav>
