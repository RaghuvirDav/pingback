# AWS deployment overlay — use with: docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d
services:
  pingback:
    environment:
      - APP_ENV=production
    restart: always
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-us-east-1}
        awslogs-group: ${AWS_LOG_GROUP:-pingback}
        awslogs-stream-prefix: ${AWS_LOG_STREAM_PREFIX:-app}
